<div class="container mt-5">
  <div class="row mb-4">
    <div class="col-md-8">
      <h2>Ateliers Management</h2>
    </div>
    <div class="col-md-4 text-end">
      <a routerLink="/atelier/add" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> Add New Atelier
      </a>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
    {{ errorMessage }}
    <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
  </div>

  <div *ngIf="isLoading" class="text-center">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="!isLoading && ateliers.length === 0" class="alert alert-info">
    No ateliers found. <a routerLink="/atelier/add">Create one</a>
  </div>

  <div *ngIf="!isLoading && ateliers.length > 0" class="table-responsive">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Instructor Email</th>
          <th>Participants</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let atelier of ateliers">
          <td>{{ atelier.id }}</td>
          <td>{{ atelier.nom }}</td>
          <td>{{ atelier.emailFormateur }}</td>
          <td>{{ atelier.nbrParticipant }}</td>
          <td>
            <span [class]="'badge ' + getStatutBadge(atelier.statut)">
              {{ getStatutText(atelier.statut) }}
            </span>
          </td>
          <td>
            <a [routerLink]="['/atelier/detail', atelier.id]" class="btn btn-sm btn-info" title="View">
              <i class="bi bi-eye"></i> View
            </a>
            <a [routerLink]="['/atelier/edit', atelier.id]" class="btn btn-sm btn-warning" title="Edit">
              <i class="bi bi-pencil"></i> Edit
            </a>
            <button (click)="deleteAtelier(atelier.id)" class="btn btn-sm btn-danger" title="Delete">
              <i class="bi bi-trash"></i> Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
